name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKEND_IMAGE: ${{ vars.V_SAVE_BACKEND_IMAGE }}
      FRONTEND_IMAGE: ${{ vars.V_SAVE_FRONTEND_IMAGE }}
      NPM_REGISTRY: ${{ vars.V_SAVE_NPM_REGISTRY }}
      APT_MIRROR: ${{ vars.V_SAVE_APT_MIRROR }}
      APT_SECURITY_MIRROR: ${{ vars.V_SAVE_APT_SECURITY_MIRROR }}
      PIP_INDEX_URL: ${{ vars.V_SAVE_PIP_INDEX_URL }}
      ALPINE_MIRROR: ${{ vars.V_SAVE_ALPINE_MIRROR }}
      VITE_API_BASE_URL: ${{ vars.V_SAVE_VITE_API_BASE_URL || '/api' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image names
        run: |
          test -n "$BACKEND_IMAGE" || { echo "缺少仓库变量 V_SAVE_BACKEND_IMAGE"; exit 1; }
          test -n "$FRONTEND_IMAGE" || { echo "缺少仓库变量 V_SAVE_FRONTEND_IMAGE"; exit 1; }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate backend tags
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Generate frontend tags
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          build-args: |
            NPM_REGISTRY=${{ env.NPM_REGISTRY }}
            APT_MIRROR=${{ env.APT_MIRROR }}
            APT_SECURITY_MIRROR=${{ env.APT_SECURITY_MIRROR }}
            PIP_INDEX_URL=${{ env.PIP_INDEX_URL }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          build-args: |
            NPM_REGISTRY=${{ env.NPM_REGISTRY }}
            ALPINE_MIRROR=${{ env.ALPINE_MIRROR }}
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
