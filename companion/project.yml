name: VSaveCompanion
options:
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    ENABLE_APP_SANDBOX: NO
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    PRODUCT_BUNDLE_IDENTIFIER: com.vsave.companion
    PRODUCT_NAME: "V-SAVE Companion"
    PRODUCT_MODULE_NAME: VSaveCompanion
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_CFBundleDisplayName: "V-SAVE Companion"
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
    INFOPLIST_KEY_LSUIElement: YES
    SWIFT_EMIT_LOC_STRINGS: NO
targets:
  VSaveCompanion:
    type: application
    platform: macOS
    sources:
      - path: VSaveCompanion
    scheme:
      testTargets:
        - VSaveCompanionTests
  VSaveCompanionTests:
    type: bundle.unit-test
    platform: macOS
    hostApplication: VSaveCompanion
    sources:
      - path: VSaveCompanionTests
    dependencies:
      - target: VSaveCompanion
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vsave.companion.tests
        PRODUCT_MODULE_NAME: VSaveCompanionTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/V-SAVE Companion.app/Contents/MacOS/V-SAVE Companion"
        BUNDLE_LOADER: "$(TEST_HOST)"
